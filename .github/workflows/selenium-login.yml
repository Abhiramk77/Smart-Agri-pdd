name: Selenium E2E Testing Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    - name: Install Dependencies
      working-directory: frontend
      run: npm install

    - name: Install Google Chrome
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable

    - name: Run React Dev Server (Background)
      working-directory: frontend
      run: npm run dev &
      
    - name: Wait for server to be ready
      run: sleep 10

    - name: Run Selenium Tests
      working-directory: frontend
      run: npm run login
